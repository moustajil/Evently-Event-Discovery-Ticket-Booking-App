<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login & Register</title>

  <link rel="stylesheet" href="style.css">
  <script src="./script/script.js" defer></script>
</head>

<body>

  <main class="container">

    <!-- Switch buttons -->
    <div class="switch-buttons">
      <button id="showLogin" class="switch-btn active">
        Login
      </button>

      <button id="showRegister" class="switch-btn">
        Register
      </button>
    </div>


    <!-- Login Form -->
    <section class="form login-form active-form">

      <h1>Welcome Back</h1>
      <p class="description">Login to your account</p>

      <form id="loginForm">

        <div class="input-section">
          <label for="loginEmail">Email</label>

          <input
            type="email"
            id="loginEmail"
            placeholder="Enter your email"
            required
          >
        </div>

        <div class="input-section">
          <label for="loginPassword">Password</label>

          <input
            type="password"
            id="loginPassword"
            placeholder="Enter your password"
            required
          >
        </div>

        <div class="remember-me">
          <label>
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>

          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn">
          Login
        </button>

      </form>

      <p class="bottom-text">
        Don't have an account?

        <button type="button" id="registerLink">
          Register
        </button>
      </p>

    </section>


    <!-- Register Form -->
    <section class="form register-form">

      <h1>Create Account</h1>
      <p class="description">Create your new account</p>

      <form id="registerForm">

        <div class="input-section">
          <label for="registerName">Full Name</label>

          <input
            type="text"
            id="registerName"
            placeholder="Enter your full name"
            required
          >
        </div>

        <div class="input-section">
          <label for="registerEmail">Email</label>

          <input
            type="email"
            id="registerEmail"
            placeholder="Enter your email"
            required
          >
        </div>

        <div class="input-section">
          <label for="registerPassword">Password</label>

          <input
            type="password"
            id="registerPassword"
            placeholder="Create a password"
            required
          >
        </div>

        <div class="input-section">
          <label for="confirmPassword">Confirm Password</label>

          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm your password"
            required
          >
        </div>

        <button type="submit" class="submit-btn">
          Create Account
        </button>

      </form>

      <p class="bottom-text">
        Already have an account?

        <button type="button" id="loginLink">
          Login
        </button>
      </p>

    </section>

  </main>

</body>
</html>
